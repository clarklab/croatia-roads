  :root{
    --paper:#f4edda; --paper2:#e9dfc2; --ink:#ece5d3; --dim:#b3c2d3; --faint:#8da2b8;
    --gold:#d8b54a; --gold2:#f3d878; --bad:#f08274; --good:#8fd9a8;
    --glass:rgba(8,16,26,.7); --glassbrd:rgba(160,190,215,.18);
    --serif:'Fraunces','Iowan Old Style',Palatino,Georgia,serif;
    --disp:'Public Sans',system-ui,'Segoe UI',Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --c-sea:#1f6e9c; --c-stone:#7a6648; --c-wind:#1f7f6e; --c-road:#a8402e;
    --signgreen:#11603a; --signblue:#14497e;
  }
  .mi{width:1em; height:1em; vertical-align:-.13em; fill:currentColor; flex:0 0 auto;}
  .bx .mi{width:14px; height:14px;}
  .bx.icon{padding:7px 9px;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; min-height:100%; background:#0a1420;}
  body{font-family:var(--serif); color:var(--ink); overflow-x:hidden;}

  /* ================= SCENE — the living coast ================= */
  /* per-leg palettes */
  body{--sky1:#33203f;--sky2:#d8865c;--suncol:#ffb27a;--sunx:72%;--suny:46%;--sunr:44px;
       --m1:#241726;--m2:#3c2438;--sea1:#27435e;--sea2:#16283c;--starop:.25;--fogop:.22;--fogdur:70s;}
  body[data-leg="1"]{--sky1:#13222b;--sky2:#46604e;--suncol:#cfe0c8;--sunx:24%;--suny:30%;--sunr:24px;
       --m1:#0c1612;--m2:#1c2b22;--sea1:#1d3a40;--sea2:#10242a;--starop:.45;--fogop:.45;--fogdur:55s;}
  body[data-leg="2"]{--sky1:#0e1d31;--sky2:#3f6f96;--suncol:#ffd9a0;--sunx:78%;--suny:34%;--sunr:30px;
       --m1:#102034;--m2:#1d3650;--sea1:#1c4566;--sea2:#10293f;--starop:.4;--fogop:.18;--fogdur:75s;}
  body[data-leg="3"]{--sky1:#1f3136;--sky2:#7fa39e;--suncol:#eef6f0;--sunx:30%;--suny:24%;--sunr:20px;
       --m1:#172325;--m2:#2a3d3e;--sea1:#2a5258;--sea2:#163135;--starop:.1;--fogop:.6;--fogdur:16s;}
  body[data-leg="4"]{--sky1:#0f131d;--sky2:#46587a;--suncol:#d7dcef;--sunx:66%;--suny:22%;--sunr:22px;
       --m1:#121a2a;--m2:#232f49;--sea1:#1d3148;--sea2:#101c2c;--starop:.6;--fogop:.3;--fogdur:60s;}
  body[data-leg="5"]{--sky1:#221d3c;--sky2:#b06040;--suncol:#ff9c5a;--sunx:38%;--suny:48%;--sunr:40px;
       --m1:#291c2c;--m2:#46283a;--sea1:#473053;--sea2:#241a30;--starop:.3;--fogop:.22;--fogdur:70s;}
  body[data-leg="6"]{--sky1:#371a3c;--sky2:#f08246;--suncol:#ffc46a;--sunx:50%;--suny:56%;--sunr:62px;
       --m1:#2b1430;--m2:#54203e;--sea1:#6e3a44;--sea2:#34172a;--starop:.12;--fogop:.16;--fogdur:80s;}
  body[data-leg="7"]{--sky1:#070d1c;--sky2:#3a3418;--suncol:#f2eed6;--sunx:74%;--suny:20%;--sunr:20px;
       --m1:#0a0f1c;--m2:#141c2e;--sea1:#101d33;--sea2:#070e1a;--starop:1;--fogop:.25;--fogdur:65s;}

  #scene{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;
    transition:filter 1.2s ease;}
  /* parallax layers — drift with the pointer (set as --parx/--pary on :root) */
  #scene .plx{position:absolute; inset:0;
    transform:translate3d(calc(var(--parx,0)*var(--pd,0px)), calc(var(--pary,0)*var(--pd,0px)*.55), 0);
    transition:transform .8s cubic-bezier(.2,.6,.3,1);}
  #scene .sky{position:absolute; inset:0;
    background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 78%, var(--sea1) 79%, var(--sea2) 100%);
    transition:background 1.5s ease;}
  #scene .stars{position:absolute; inset:0 0 30% 0; opacity:var(--starop); transition:opacity 1.5s;
    background-image:
      radial-gradient(1.2px 1.2px at 12% 22%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 28% 9%, #fff 50%, transparent 51%),
      radial-gradient(1.4px 1.4px at 41% 31%, #ffeec8 50%, transparent 51%),
      radial-gradient(1px 1px at 57% 14%, #fff 50%, transparent 51%),
      radial-gradient(1.3px 1.3px at 66% 27%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 78% 7%, #cfe2ff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 89% 19%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 8% 44%, #fff 50%, transparent 51%),
      radial-gradient(1.2px 1.2px at 49% 48%, #ffeec8 50%, transparent 51%),
      radial-gradient(1px 1px at 93% 41%, #fff 50%, transparent 51%);
    animation:twinkle 7s ease-in-out infinite alternate;}
  @keyframes twinkle{from{opacity:calc(var(--starop)*.55)} to{opacity:var(--starop)}}
  /* a shooting star, rare, only on starry legs */
  #scene .shoot{position:absolute; top:9%; left:62%; width:96px; height:2px; border-radius:2px;
    background:linear-gradient(90deg,#fff,rgba(255,255,255,0)); opacity:0;
    filter:drop-shadow(0 0 4px rgba(255,255,255,.8));
    animation:shoot 13s linear infinite;}
  @keyframes shoot{0%,86%{opacity:0; transform:rotate(26deg) translateX(0);}
    88%{opacity:calc(var(--starop)*.9);}
    95%,100%{opacity:0; transform:rotate(26deg) translateX(170px);}}
  #scene .sun{position:absolute; left:var(--sunx); top:var(--suny); width:calc(var(--sunr)*2); height:calc(var(--sunr)*2);
    margin:calc(var(--sunr)*-1) 0 0 calc(var(--sunr)*-1); border-radius:50%;
    background:var(--suncol); transition:all 1.5s ease;
    animation:sunbreathe 7s ease-in-out infinite alternate;
    box-shadow:0 0 30px 6px var(--suncol), 0 0 120px 40px color-mix(in srgb, var(--suncol) 35%, transparent);}
  @keyframes sunbreathe{from{filter:brightness(1)} to{filter:brightness(1.14)}}
  /* slow god-rays turning around the sun */
  #scene .rays{position:absolute; left:var(--sunx); top:var(--suny); width:calc(var(--sunr)*11); height:calc(var(--sunr)*11);
    margin:calc(var(--sunr)*-5.5) 0 0 calc(var(--sunr)*-5.5); border-radius:50%; opacity:.55;
    background:repeating-conic-gradient(from 0deg, transparent 0deg 11deg,
      color-mix(in srgb, var(--suncol) 9%, transparent) 14deg 18deg, transparent 21deg 30deg);
    -webkit-mask-image:radial-gradient(circle, #000 0 26%, transparent 66%);
    mask-image:radial-gradient(circle, #000 0 26%, transparent 66%);
    animation:rayspin 80s linear infinite; transition:left 1.5s ease, top 1.5s ease;}
  @keyframes rayspin{to{transform:rotate(360deg)}}
  @supports not (color: color-mix(in srgb, red, blue)){
    #scene .sun{box-shadow:0 0 30px 6px var(--suncol), 0 0 120px 40px rgba(255,190,120,.3);}
    #scene .rays{display:none;} }
  /* soft clouds crossing the sky */
  #scene .cloud{position:absolute; width:34%; height:7%; border-radius:50%; left:-36%;
    background:radial-gradient(50% 56% at 50% 50%, rgba(228,236,246,.17), transparent 72%);
    filter:blur(5px); animation:clouddrift 115s linear infinite;}
  #scene .c2{top:25%; width:26%; height:5.5%; opacity:.65; animation-duration:165s; animation-delay:-80s;}
  #scene .c1{top:12%; animation-delay:-30s;}
  @keyframes clouddrift{from{transform:translateX(0)} to{transform:translateX(145vw)}}
  /* birds — they fade out as the stars come up */
  #scene .birds{position:absolute; top:20%; left:0; width:30px; height:14px;
    color:var(--m2); opacity:calc(.75 - var(--starop)*.5);
    animation:fly 46s linear infinite; transition:opacity 1.5s, color 1.5s;}
  #scene .b2{top:27%; width:19px; animation-duration:69s; animation-delay:-32s;}
  #scene .birds svg{width:100%; height:100%; overflow:visible; display:block;}
  #scene .birds path{fill:none; stroke:currentColor; stroke-width:1.8; stroke-linecap:round;}
  #scene .birds .wu{animation:flap .58s steps(1,end) infinite;}
  #scene .birds .wd{animation:flap .58s steps(1,end) -.29s infinite;}
  @keyframes flap{0%,100%{opacity:1} 50%{opacity:0}}
  @keyframes fly{0%{transform:translate(-8vw,0)} 30%{transform:translate(28vw,-3vh)}
    60%{transform:translate(64vw,1vh)} 100%{transform:translate(110vw,-2vh)}}
  #scene .mtn{position:absolute; left:-4%; width:108%;}
  #scene .mtn path{transition:fill 1.5s ease;}
  #scene .m3{bottom:25%; height:21%; opacity:.6; animation:mtndrift 95s ease-in-out infinite alternate;}
  #scene .m3 path{fill:var(--m2);}
  @supports (color: color-mix(in srgb, red, blue)){
    #scene .m3{opacity:.9;} #scene .m3 path{fill:color-mix(in srgb, var(--m2) 52%, var(--sky2));} }
  #scene .m2{bottom:21%; height:26%; animation:mtndrift 72s ease-in-out infinite alternate-reverse;}
  #scene .m2 path{fill:var(--m2);}
  #scene .m1{bottom:14%; height:26%; animation:mtndrift 54s ease-in-out infinite alternate;}
  #scene .m1 path{fill:var(--m1);}
  @keyframes mtndrift{from{transform:translateX(-1.4%)} to{transform:translateX(1.4%)}}
  #scene .isle{position:absolute; bottom:20.6%; left:10%; width:24%; height:4.5%;}
  #scene .isle path{fill:var(--m2); opacity:.9; transition:fill 1.5s ease;}
  #scene .sea{position:absolute; left:0; right:0; bottom:0; height:22%;
    background:linear-gradient(180deg, var(--sea1), var(--sea2)); transition:background 1.5s ease;}
  #scene .sea::before{content:""; position:absolute; inset:0; opacity:.25;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,.10) 0 1px, transparent 1px 7px);
    mask-image:linear-gradient(180deg,#000,transparent);
    -webkit-mask-image:linear-gradient(180deg,#000,transparent);
    animation:seadrift 9s linear infinite;}
  @keyframes seadrift{from{background-position:0 0} to{background-position:0 7px}}
  #scene .seaspark{position:absolute; left:0; right:0; bottom:4%; height:16%;
    background-image:
      radial-gradient(1.4px 1px at 16% 28%, #fff 50%, transparent 51%),
      radial-gradient(1.2px 1px at 31% 62%, #ffeec8 50%, transparent 51%),
      radial-gradient(1.5px 1px at 47% 38%, #fff 50%, transparent 51%),
      radial-gradient(1.2px 1px at 60% 70%, #fff 50%, transparent 51%),
      radial-gradient(1.6px 1px at 72% 30%, #ffeec8 50%, transparent 51%),
      radial-gradient(1.2px 1px at 86% 55%, #fff 50%, transparent 51%);
    animation:sparkle 4.5s ease-in-out infinite alternate;}
  @keyframes sparkle{from{opacity:.12} to{opacity:.42}}
  #scene .glint{position:absolute; bottom:8%; left:calc(var(--sunx) - 9%); width:18%; height:13%;
    background:radial-gradient(50% 50% at 50% 50%, color-mix(in srgb, var(--suncol) 38%, transparent), transparent 70%);
    filter:blur(4px); animation:glint 5s ease-in-out infinite alternate; transition:left 1.5s ease;}
  @keyframes glint{from{opacity:.5} to{opacity:1}}
  /* foreground headland: two cypresses and an umbrella pine, swaying in the bura */
  #scene .trees{position:absolute; right:-8px; bottom:18.5%; width:clamp(120px,24vw,200px); height:auto;}
  #scene .trees path{fill:var(--m1); transition:fill 1.5s ease;}
  @supports (color: color-mix(in srgb, red, blue)){
    #scene .trees path{fill:color-mix(in srgb, var(--m1) 74%, #04070c);} }
  #scene .trees .sway{transform-box:fill-box; transform-origin:50% 100%;
    animation:sway 6s ease-in-out infinite alternate;}
  #scene .trees .s2{animation-duration:7.4s; animation-delay:-2.4s;}
  #scene .trees .s3{animation-duration:5.1s; animation-delay:-1.2s;}
  @keyframes sway{from{transform:rotate(-1.5deg)} to{transform:rotate(1.8deg)}}
  #scene .fogband{position:absolute; width:170%; height:24%; bottom:16%; opacity:var(--fogop);
    background:radial-gradient(48% 58% at 50% 50%, rgba(214,228,233,.85), transparent 72%);
    filter:blur(10px); transition:opacity 1.5s;}
  #scene .f1{animation:fogdrift var(--fogdur) linear infinite alternate;}
  #scene .f2{bottom:9%; height:18%; animation:fogdrift var(--fogdur) linear infinite alternate-reverse;}
  @keyframes fogdrift{from{transform:translateX(-26%)} to{transform:translateX(-4%)}}
  #scene .vig{position:absolute; inset:0;
    background:radial-gradient(120% 95% at 50% 38%, transparent 55%, rgba(2,6,12,.55) 100%);}
  body[data-boss="tunnel"] #scene{filter:brightness(.32) saturate(.6);}
  body[data-screen="gameover"] #scene{filter:saturate(.25) brightness(.75);}
  body[data-screen="gameover"] #scene .fogband{opacity:.95;}
  body[data-screen="win"] #scene{filter:saturate(1.25) brightness(1.1) sepia(.18);}

  /* ================= APP SHELL ================= */
  /* The whole game fits one mobile-portrait viewport: no scrolling, ever. */
  #app{position:relative; z-index:1; max-width:560px; margin:0 auto; height:100dvh;
    padding:max(8px, env(safe-area-inset-top)) 12px calc(10px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; overflow:hidden;}
  @media (max-height:620px){ #app{height:auto; min-height:100dvh; overflow:visible;} }
  @media (max-height:760px){
    .fan{min-height:106px; padding:20px 0 6px;}
    .pz{min-height:64px;}
    .dash{padding:7px 11px 8px;}
    .meter b{font-size:14px;}
    .itstage{min-height:148px;}
  }
  .grow{flex:1 1 auto; min-height:0;}
  h1,h2,h3,p{margin:0; font-weight:normal;}

  /* ================= SIGNAGE / TYPE ================= */
  .glagtitle{font-family:'Glag',var(--serif); font-size:clamp(30px,9vw,44px); letter-spacing:3px; color:var(--gold2); text-align:center;
    text-shadow:0 1px 0 #5a4612, 0 0 26px rgba(216,181,74,.5);}
  .latintitle{font-family:var(--disp); font-weight:800; text-transform:uppercase; letter-spacing:.34em;
    text-indent:.34em; text-align:center; color:var(--ink); font-size:13px; margin-top:6px; opacity:.92;}
  .subtitle{text-align:center; color:#bcc9da; font-style:italic; font-size:14.5px; margin-top:10px;
    text-shadow:0 1px 3px rgba(2,6,12,.9);}
  .oracle{font-style:italic; color:#cdd9e4; font-size:14px; line-height:1.58;}
  .tiny{font-family:var(--disp); font-size:12px; color:var(--faint); line-height:1.5;}

  .roadsign{display:inline-flex; align-items:center; gap:9px; background:linear-gradient(180deg,#177347,#0f5634);
    border:2px solid #e8f2ea; outline:2px solid #0c3a23; border-radius:8px; padding:7px 12px;
    font-family:var(--disp); font-weight:700; text-transform:uppercase; letter-spacing:.05em;
    color:#fff; font-size:13.5px; box-shadow:0 4px 14px rgba(0,0,0,.45); white-space:nowrap;}
  .roadsign .arr{opacity:.85; font-family:var(--serif);}
  .roadsign .legno{font-size:10px; background:rgba(255,255,255,.2); border-radius:4px; padding:2px 6px;
    letter-spacing:.1em;}
  .blindchip{display:inline-block; font-family:var(--disp); font-weight:700; text-transform:uppercase;
    letter-spacing:.08em; font-size:11.5px; color:#e4eef8; background:linear-gradient(180deg,#1b4a7e,#143a64);
    border:1.5px solid #cfe0f0; border-radius:7px; padding:5px 10px; box-shadow:0 3px 10px rgba(0,0,0,.4);}
  .blindchip.boss{background:linear-gradient(180deg,#7e1f1b,#5e1512); border-color:#f4d9d2; color:#ffe4dc;}

  .warnsign{display:flex; gap:10px; align-items:flex-start; background:linear-gradient(180deg,rgba(64,18,22,.92),rgba(38,10,14,.92));
    border:1.5px solid #b8473c; border-radius:11px; padding:9px 11px; margin:7px 0;
    box-shadow:0 6px 18px rgba(0,0,0,.4); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);}
  .warnsign .tri{flex:0 0 auto; width:30px; height:28px;}
  .warnsign b{font-family:var(--disp); font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#ffd9cf; font-size:12.5px;}
  .warnsign p{color:#f0c4b8; font-size:12.5px; line-height:1.45; margin-top:3px;}
  .warnsign .wf{color:#d8a89e; font-style:italic; font-family:var(--serif);}

  /* ================= GLASS PANELS ================= */
  .panel{background:var(--glass); border:1px solid var(--glassbrd); border-radius:14px;
    padding:12px 14px; margin:7px 0; backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px);
    box-shadow:0 10px 30px rgba(0,0,0,.35);}

  /* ================= DASHBOARD ================= */
  .dash{background:var(--glass); border:1px solid var(--glassbrd); border-radius:14px;
    padding:9px 12px 10px; margin:6px 0 4px; backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px);}
  .odorow{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
  .odo{font-family:var(--mono); font-size:clamp(24px,7.5vw,32px); color:var(--gold2); letter-spacing:1px;
    text-shadow:0 0 16px rgba(216,181,74,.35); font-variant-numeric:tabular-nums;}
  .odo .mi{font-size:.62em; vertical-align:.06em; margin-right:4px; opacity:.9;}
  .odo small{font-size:11px; color:var(--dim); font-family:var(--disp); font-weight:600; text-transform:uppercase; letter-spacing:.1em; margin-left:5px;}
  .odotarget{font-family:var(--mono); color:var(--dim); font-size:13px; font-variant-numeric:tabular-nums; text-align:right;}
  .odotarget b{color:var(--ink);}
  .roadtrack{position:relative; height:16px; margin:8px 0 2px; border-radius:8px; overflow:hidden;
    background:linear-gradient(180deg,#222a31,#15191e); border:1px solid #39424b;}
  .roadtrack .dashes{position:absolute; inset:0;
    background:repeating-linear-gradient(90deg, transparent 0 12px, rgba(244,237,218,.5) 12px 22px) center/100% 2px no-repeat;}
  .roadtrack .gone{position:absolute; left:0; top:0; bottom:0; width:var(--pct,0%);
    background:linear-gradient(90deg, rgba(216,181,74,.18), rgba(216,181,74,.42)); transition:width .6s cubic-bezier(.3,.8,.3,1);}
  .roadtrack .car{position:absolute; top:50%; left:var(--pct,0%); transform:translate(-72%,-50%);
    width:24px; height:11px; transition:left .6s cubic-bezier(.3,.8,.3,1); filter:drop-shadow(0 0 5px rgba(216,181,74,.7));}
  .meters{display:flex; gap:6px; margin-top:8px;}
  .meter{flex:1; text-align:center; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09);
    border-radius:8px; padding:4px 2px 5px;}
  .meter b{display:block; font-family:var(--mono); font-size:16px; color:var(--ink); font-variant-numeric:tabular-nums;}
  .meter b .mi{font-size:12px; vertical-align:-.06em; margin-right:2px; opacity:.85;}
  .meter.kn b{color:var(--gold2);}
  .meter label{font-family:var(--disp); font-weight:600; text-transform:uppercase; letter-spacing:.08em; font-size:9.5px; color:var(--faint);}

  /* ================= CREW (jokers/omens) — compact portrait chips ================= */
  .crew{display:flex; gap:8px; align-items:flex-start; overflow-x:auto; padding:5px 2px 11px; margin:0 -2px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch; flex:0 0 auto;}
  .crew::-webkit-scrollbar{display:none;}
  .ctile{position:relative; flex:0 0 auto; width:44px; height:44px; border-radius:50%; cursor:pointer; padding:0;
    font-family:var(--serif); font-size:19px; color:var(--gold2); text-align:center; line-height:42px;
    background:radial-gradient(circle at 35% 30%, #3d4f74, #1c2740); border:1.5px solid #5a6f9c;
    box-shadow:0 4px 10px rgba(0,0,0,.45); transition:transform .12s, border-color .12s;}
  .ctile:active{transform:scale(.94);}
  .ctile.open{border-color:var(--gold); box-shadow:0 0 0 1.5px var(--gold), 0 4px 10px rgba(0,0,0,.45);}
  .ctile .ct{position:absolute; left:50%; bottom:-8px; transform:translateX(-50%); z-index:2;
    font-family:var(--mono); font-size:9px; line-height:1; color:var(--good); white-space:nowrap;
    background:#0c1422; border:1px solid #3b4f74; border-radius:7px; padding:2px 5px;}
  .ctile.omen{background:radial-gradient(circle at 35% 30%, #2f5c40, #122218); border-color:#4f8a62; color:#b8e8c4;}
  .ctile.omen::after{content:"☽"; position:absolute; right:-3px; top:-4px; z-index:2; width:15px; height:15px;
    line-height:14px; font-size:9px; color:#dff2e2; background:#1d4029; border:1px solid #4f8a62; border-radius:50%;}
  .slotnote{font-family:var(--disp); font-weight:600; font-size:10px; color:var(--faint); letter-spacing:.12em;
    text-transform:uppercase; align-self:center; white-space:nowrap; padding-bottom:6px;}

  /* info opens as a bottom sheet so the layout never jumps */
  .scrim{position:fixed; inset:0; z-index:48; background:rgba(3,8,15,.5);}
  .infobar{position:fixed; z-index:49; left:50%; transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom)); width:min(536px, calc(100vw - 20px));
    background:rgba(10,18,30,.96); border:1px solid var(--gold); border-radius:14px; padding:13px 15px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); animation:sheetup .22s ease;
    box-shadow:0 -8px 40px rgba(0,0,0,.55);}
  @keyframes sheetup{from{opacity:0; transform:translateX(-50%) translateY(18px);} to{opacity:1; transform:translateX(-50%) translateY(0);}}
  .infobar.omen{border-color:#4f8a62;}
  .infobar b{font-family:var(--disp); font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--gold2); font-size:13px;}
  .infobar.omen b{color:#a8e0b4;}
  .infobar .tagv{font-family:var(--mono); color:var(--good); font-size:12px; margin-left:6px;}
  .infobar p{color:#c6d2e2; font-size:13px; line-height:1.5; margin:5px 0 0;}
  .infobar .ibtns{display:flex; gap:7px; margin-top:10px;}
  .sw{white-space:nowrap; font-family:var(--disp); font-weight:600; letter-spacing:.02em;}
  .sw svg{width:12px; height:12px; vertical-align:-1.5px;}
  .sw.sea{color:#7fc3e8;} .sw.stone{color:#d4bc96;} .sw.wind{color:#74d4bc;} .sw.road{color:#f49a82;}

  /* ================= PLAYZONE ================= */
  .pz{flex:1; min-height:84px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:8px; gap:4px; margin:4px 0; border-radius:14px; overflow:hidden;
    background:rgba(7,14,23,.62); border:1px solid rgba(160,190,215,.12);
    backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);}
  .pz.idle p{font-style:italic; font-family:var(--serif); color:#a7bacc; font-size:12.5px; max-width:320px; line-height:1.55;}
  .pzname{font-family:var(--disp); font-weight:700; text-transform:uppercase; letter-spacing:.14em; font-size:13px; color:var(--gold2);}
  .pzname i{font-style:normal; font-size:10.5px; color:var(--dim); letter-spacing:.1em;}
  .pzcards{display:flex; gap:6px; justify-content:center; margin:2px 0; padding-top:17px;}
  .zc{position:relative; animation:zpop .3s cubic-bezier(.2,1.4,.4,1) both;}
  .zc .zk{position:absolute; left:50%; top:-15px; transform:translateX(-50%); font-family:var(--mono);
    font-size:12px; color:#a5dcf2; white-space:nowrap; animation:chipfloat .55s ease both; text-shadow:0 1px 4px #000;}
  .zc .zk i{font-style:normal; color:#f4ad96; margin-left:3px;}
  .zc.zdeb .mini, .zc.zoff .mini{filter:grayscale(1) brightness(.5);}
  .pzmath{display:flex; align-items:baseline; gap:7px; font-family:var(--mono); animation:fadeup .3s ease both;}
  .pzmath b{font-size:20px; font-variant-numeric:tabular-nums;}
  .pzmath .km{color:#7fc3e8;} .pzmath .tm{color:#f49a82;}
  .pzmath span{font-family:var(--disp); font-weight:600; font-size:9.5px; letter-spacing:.12em; color:var(--faint); text-transform:uppercase;}
  .pzmath em{font-style:normal; color:var(--dim); font-size:15px;}
  .pztotal{font-family:var(--mono); font-size:26px; color:var(--gold2); font-variant-numeric:tabular-nums;
    text-shadow:0 0 18px rgba(216,181,74,.5); animation:slam .34s cubic-bezier(.2,1.5,.4,1) both;}
  .pztotal span{font-size:13px; color:var(--dim);}
  .pztotal.ghost{opacity:.6; text-shadow:none; animation:none;}
  .pz.preview .pzmath{animation:none;}
  .pz.noanim *{animation:none !important;}
  .con{display:inline-flex; flex-direction:column; gap:1px; align-self:center; margin:0 1px; min-width:13px;
    font-family:var(--disp); font-weight:700; font-size:10px; text-align:center; animation:fadeup .3s ease both;}
  .con.none{color:rgba(141,162,184,.55); font-size:13px;}
  .con i{font-style:normal; line-height:1.1;}
  .b-link{color:#8fd9a8; font-style:normal;} .b-shift{color:#7fc3e8; font-style:normal;} .b-echo{color:#f49a82; font-style:normal;}
  .pzmoves{font-family:var(--disp); font-weight:600; font-size:10px; letter-spacing:.1em; text-transform:uppercase;}
  .pzmoves span{color:var(--faint);}
  .pz.fs{border-color:rgba(216,181,74,.55); box-shadow:0 0 22px rgba(216,181,74,.22) inset, 0 0 18px rgba(216,181,74,.12);}
  .pz.fs .pzname{text-shadow:0 0 14px rgba(216,181,74,.8);}
  .pzhint{font-family:var(--disp); font-weight:600; font-size:10.5px; letter-spacing:.05em; text-transform:uppercase;
    color:var(--dim); line-height:2; margin-bottom:2px;}
  .pzhint .mi{color:var(--gold2);}
  .pcard .ord{position:absolute; top:-9px; right:-6px; width:20px; height:20px; border-radius:50%;
    background:linear-gradient(180deg,var(--gold2),#b08f2e); color:#241c04; font-family:var(--disp);
    font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,.5); border:1px solid #f8ecc0;}
  .pzdeb{font-size:11px; color:var(--bad); font-family:var(--disp); letter-spacing:.1em; text-transform:uppercase;}
  @keyframes zpop{from{transform:scale(.4) rotate(-6deg); opacity:0} to{transform:scale(1) rotate(0); opacity:1}}
  @keyframes chipfloat{from{opacity:0; transform:translate(-50%,8px)} 35%{opacity:1} to{opacity:1; transform:translate(-50%,0)}}
  @keyframes fadeup{from{opacity:0; transform:translateY(7px)} to{opacity:1; transform:translateY(0)}}
  @keyframes slam{from{opacity:0; transform:scale(1.7)} to{opacity:1; transform:scale(1)}}

  /* ================= CARDS ================= */
  .fan{display:flex; justify-content:center; align-items:flex-end; padding:26px 0 8px; min-height:120px; flex:0 0 auto;}
  .pcard{position:relative; width:62px; height:88px; border-radius:8px; flex:0 0 auto;
    margin:0 clamp(-19px, calc(((min(100vw, 560px) - 46px) / var(--n,8) - 62px) / 2), -5px);
    background:
      radial-gradient(120% 90% at 50% 0%, var(--wash,transparent), transparent 70%),
      linear-gradient(163deg,#faf4e4 0%, #efe6cc 60%, #e6dabb 100%);
    border:1px solid #c8b98f; cursor:pointer; user-select:none; color:var(--sc,#333);
    box-shadow:0 4px 10px rgba(0,0,0,.45), inset 0 0 0 1.5px rgba(255,255,255,.5);
    transform:rotate(var(--rot,0deg)) translateY(var(--ty,0px));
    transition:transform .16s cubic-bezier(.3,1.3,.4,1), box-shadow .16s;}
  .pcard.sel{transform:rotate(0deg) translateY(calc(var(--ty,0px) - 26px)) scale(1.06); z-index:5;
    box-shadow:0 12px 24px rgba(0,0,0,.55), 0 0 0 2px var(--gold), 0 0 22px rgba(216,181,74,.45),
      inset 0 0 0 1.5px rgba(255,255,255,.5);}
  .pcard.deal{animation:dealin .42s cubic-bezier(.2,1.2,.35,1) both;}
  @keyframes dealin{from{transform:translate(60px,-70px) rotate(14deg); opacity:0}
    to{transform:rotate(var(--rot,0deg)) translateY(var(--ty,0px)); opacity:1}}
  .suit-sea{--sc:var(--c-sea); --wash:rgba(31,110,156,.085);}
  .suit-stone{--sc:var(--c-stone); --wash:rgba(122,102,72,.10);}
  .suit-wind{--sc:var(--c-wind); --wash:rgba(31,127,110,.085);}
  .suit-road{--sc:var(--c-road); --wash:rgba(168,64,46,.075);}
  .pcard .idx{position:absolute; top:4px; left:5px; line-height:1; text-align:center; z-index:2;}
  .pcard .idx.flip{top:auto; left:auto; bottom:4px; right:5px; transform:rotate(180deg); opacity:.85;}
  .pcard .idx.flip b{font-size:13px;}
  .pcard .idx.flip svg.ip{width:8.5px; height:8.5px;}
  .pcard .idx b{display:block; font-family:var(--disp); font-weight:700; font-size:18.5px;
    text-shadow:0 1px 0 rgba(255,255,255,.65);}
  .pcard .idx svg.ip{width:11px; height:11px; margin-top:2px;}
  .pcard .bigpip{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;}
  .pcard .bigpip{top:9px;}
  .pcard .bigpip .ring{position:absolute; width:47px; height:47px; border-radius:50%;
    border:1.3px solid currentColor; opacity:.17;}
  .pcard .bigpip .gbg{position:absolute; font-family:'Glag',var(--serif); font-size:48px;
    opacity:.075; line-height:1; transform:translateY(-2px);}
  .pcard .bigpip svg{width:33px; height:33px; opacity:.95; position:relative;
    filter:drop-shadow(0 1px 0 rgba(255,255,255,.55));}
  .pcard .face{font-family:'Glag',var(--serif); position:absolute; inset:15px 11px 15px; display:flex; align-items:center; justify-content:center;
    font-size:29px; border:1.4px solid currentColor; border-radius:6px;
    background:linear-gradient(155deg, var(--wash,transparent), rgba(255,255,255,.3));}
  .pcard .face span{text-shadow:0 1px 0 rgba(255,255,255,.6);}
  .pcard .ftick{position:absolute; width:5.5px; height:5.5px; border-color:currentColor; border-style:solid;
    border-width:0; opacity:.55;}
  .pcard .ftick.tl{top:2px; left:2px; border-top-width:1.4px; border-left-width:1.4px;}
  .pcard .ftick.tr{top:2px; right:2px; border-top-width:1.4px; border-right-width:1.4px;}
  .pcard .ftick.bl{bottom:2px; left:2px; border-bottom-width:1.4px; border-left-width:1.4px;}
  .pcard .ftick.br{bottom:2px; right:2px; border-bottom-width:1.4px; border-right-width:1.4px;}
  .pcard .a1{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); padding:5px 9px 7px;
    background:linear-gradient(180deg,#1a7a4a,#11572f); color:#fff; border:1.5px solid #fff;
    outline:1.5px solid #0c4226; border-radius:8px 8px 10px 10px;
    font-family:var(--disp); font-weight:700; font-size:17px; letter-spacing:.04em;
    box-shadow:0 2px 5px rgba(0,0,0,.3); text-align:center;}
  .pcard .a1 .a1line{display:block; height:2.5px; margin-top:3px; border-radius:2px;
    background:repeating-linear-gradient(90deg,#fff 0 4px,transparent 4px 7px); opacity:.85;}
  .pcard .cframe{position:absolute; inset:3px; border-radius:5.5px; pointer-events:none;
    border:1px solid currentColor; opacity:.14;}
  .pcard.saint{border-color:var(--gold);}
  .pcard.saint::before{content:""; position:absolute; inset:-1px; border-radius:8px; pointer-events:none;
    box-shadow:inset 0 0 10px rgba(216,181,74,.65), 0 0 9px rgba(216,181,74,.5);}
  .pcard.saint .idx::after{content:"✦"; display:block; color:#a8821e; font-size:8.5px; margin-top:1px;}
  .pcard.deb{filter:grayscale(.95) brightness(.6);}
  .pcard.deb::after{content:""; position:absolute; inset:0; border-radius:8px;
    background:linear-gradient(45deg, transparent 47.5%, rgba(60,20,20,.85) 47.5% 52.5%, transparent 52.5%),
      linear-gradient(-45deg, transparent 47.5%, rgba(60,20,20,.85) 47.5% 52.5%, transparent 52.5%);}
  .pcard.back{background:
      radial-gradient(circle at 50% 50%, rgba(216,181,74,.16) 0 24%, transparent 25%),
      repeating-linear-gradient(45deg,#1c2b44 0 7px,#16223a 7px 14px);
    border-color:#3c5278;}
  .pcard.back .idx,.pcard.back .gn,.pcard.back .bigpip,.pcard.back .face,.pcard.back .a1{display:none;}
  .pcard.back::before{content:""; position:absolute; inset:7px; border-radius:5px;
    border:1px solid rgba(216,181,74,.28);}
  .pcard.back::after{content:"Ⱅ"; font-family:'Glag',var(--serif); position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; font-size:25px; color:#5d7ba8; text-shadow:0 0 8px rgba(93,123,168,.6);}
  .mini{position:relative; width:40px; height:57px; border-radius:5px;
    background:linear-gradient(163deg,#faf4e4,#e9dec1); border:1px solid #c8b98f; color:var(--sc,#333);
    box-shadow:0 2px 6px rgba(0,0,0,.4); display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .mini b{font-family:var(--disp); font-size:14px; line-height:1;}
  .mini svg{width:14px; height:14px; margin-top:3px;}
  .mini .fg{font-size:17px; line-height:1.1;}

  /* ================= BUTTONS / ACTION BAR ================= */
  .bx{display:inline-flex; align-items:center; justify-content:center; gap:7px; font-family:var(--disp);
    font-weight:700; text-transform:uppercase; letter-spacing:.07em; font-size:12.5px; color:#e9f0f7;
    background:linear-gradient(180deg,#27486e,#1a3354);
    border:1px solid #4a6e96; border-radius:12px; padding:12px 16px; cursor:pointer;
    box-shadow:0 5px 14px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.14); transition:transform .1s, filter .15s;}
  .bx:active{transform:scale(.97);}
  .bx:disabled{opacity:.42; pointer-events:none;}
  .bx.gold{background:linear-gradient(180deg,#a07f24,#6e5414); border-color:#e2c25e; color:#fff7da;
    text-shadow:0 1px 2px rgba(60,40,0,.55); position:relative; overflow:hidden;}
  .bx.gold::after{content:""; position:absolute; top:0; bottom:0; width:46%; left:-60%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.28), transparent);
    animation:shine 3.2s ease-in-out infinite;}
  @keyframes shine{0%,55%{left:-60%} 85%,100%{left:130%}}
  .bx.warn{background:linear-gradient(180deg,#6e2a22,#4c1b16); border-color:#a85648; color:#f8d6cc;}
  .bx.sm{padding:7px 11px; font-size:11px; border-radius:9px; letter-spacing:.05em;}
  .bx.ghost{background:rgba(10,18,30,.5); border-color:rgba(255,255,255,.22); box-shadow:none;}
  .actionbar{display:flex; gap:9px; padding:2px 0 0; flex:0 0 auto;}
  .actionbar .bx{flex:1; padding:13px 8px;}
  .actionbar .bx.gold{flex:1.6; font-size:14px;}
  .fanbar{display:flex; justify-content:space-between; align-items:center; padding:0 2px; flex:0 0 auto;}
  .seg{display:inline-flex; border:1px solid rgba(255,255,255,.2); border-radius:9px; overflow:hidden;}
  .seg button{font-family:var(--disp); font-weight:600; text-transform:uppercase; letter-spacing:.05em; font-size:10.5px;
    background:transparent; color:var(--dim); border:0; padding:6px 10px; cursor:pointer;}
  .seg button.on{background:rgba(216,181,74,.22); color:var(--gold2);}

  /* ================= RECEIPT ================= */
  .receiptwrap{display:flex; justify-content:center; padding:6px 0; flex:0 0 auto;}
  .receipt{width:min(312px,88vw); background:#f6f2e6; color:#2b2922; font-family:var(--mono); font-size:12.5px;
    padding:12px 15px 18px; box-shadow:0 14px 40px rgba(0,0,0,.55); position:relative;
    animation:fadeup .35s ease; line-height:1.5;
    -webkit-mask-image:linear-gradient(#000 0 calc(100% - 9px), transparent calc(100% - 9px)),
      radial-gradient(circle at 8px calc(100% - 0px), #000 0 8px, transparent 8px);
    mask-image:linear-gradient(#000 calc(100% - 9px), transparent calc(100% - 9px));}
  .receipt::after{content:""; position:absolute; left:0; right:0; bottom:0; height:9px;
    background:linear-gradient(-45deg, transparent 6.5px, #f6f2e6 7px) 0 0/13px 13px repeat-x,
      linear-gradient(45deg, transparent 6.5px, #f6f2e6 7px) 6.5px 0/13px 13px repeat-x;}
  .receipt h3{text-align:center; font-size:13px; letter-spacing:.14em; margin-bottom:2px;}
  .receipt .rsub{text-align:center; font-size:10.5px; color:#57534a; letter-spacing:.06em;}
  .receipt .rl{display:flex; justify-content:space-between; gap:8px; font-variant-numeric:tabular-nums;}
  .receipt .rl span:first-child{overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .receipt .rdiv{border:0; border-top:1.5px dashed #b8b09a; margin:7px 0;}
  .receipt .rtotal{font-weight:bold; font-size:15px;}
  .receipt .rfoot{text-align:center; font-size:10.5px; color:#57534a; margin-top:8px; letter-spacing:.08em;}

  /* ================= SHOP ================= */
  .shopitem{display:flex; justify-content:space-between; gap:10px; align-items:center;
    background:linear-gradient(168deg,rgba(38,52,80,.9),rgba(22,31,50,.9)); border:1px solid #3d5176;
    border-radius:12px; padding:9px 11px; margin:7px 0; backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);}
  .shopitem.sold{opacity:.38;}
  .shopitem .skind{font-family:var(--disp); font-weight:600; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint);}
  .shopitem .sname{font-family:var(--disp); font-weight:700; text-transform:uppercase; letter-spacing:.03em; color:var(--gold2);
    font-size:12.5px; margin:2px 0 3px;}
  .shopitem .sdesc{color:#bac7d8; font-size:12px; line-height:1.4;}
  .pricetag{flex:0 0 auto; text-align:center;}
  .pricetag .pt{display:inline-block; background:#f0e6c8; color:#473a13; font-family:var(--mono); font-size:12.5px;
    font-weight:bold; padding:3px 8px; border-radius:4px; transform:rotate(3deg); box-shadow:0 2px 6px rgba(0,0,0,.4);
    margin-bottom:6px; white-space:nowrap;}

  /* ================= BIG SCREENS ================= */
  .big{flex:1; min-height:0; display:flex; flex-direction:column; text-align:center;
    padding:8px 6px; gap:2px; overflow:hidden auto;}
  .big::before,.big::after{content:""; flex:1 1 0; min-height:0;}
  .big h2{font-family:var(--disp); font-weight:700; text-transform:uppercase; letter-spacing:.14em; text-indent:.14em;
    color:var(--gold2); font-size:clamp(14px,4.4vw,18px); margin:6px 0;}
  .big h2.mut{color:#bcc9da;}
  .fogtext{font-family:var(--serif); color:#ccd8e5; font-style:italic; line-height:1.55; font-size:13.5px; max-width:350px; margin:0 auto;
    text-shadow:0 1px 3px rgba(2,6,12,.9), 0 0 14px rgba(2,6,12,.65);}
  .crown{width:54px; height:38px; margin:0 auto 6px; filter:drop-shadow(0 0 14px rgba(216,181,74,.6));}
  .menubtns{display:flex; flex-direction:column; gap:9px; align-items:stretch; max-width:280px;
    width:100%; margin:12px auto 0;}
  /* ---- main menu: tagline, carousel, signage grid ---- */
  .mtag{font-family:var(--serif); font-style:italic; font-size:18.5px; line-height:1.42; color:#f3e8d4;
    margin:12px auto 0; text-shadow:0 2px 10px rgba(2,6,12,.9);}
  .mcar{position:relative; flex:0 0 auto; width:min(340px,100%); margin:15px auto 0; cursor:pointer;
    background:var(--glass); border:1px solid var(--glassbrd); border-radius:14px; padding:13px 16px 9px;
    backdrop-filter:blur(9px); -webkit-backdrop-filter:blur(9px); min-height:128px;
    display:flex; flex-direction:column; justify-content:space-between;
    box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .mslide{display:flex; flex-direction:column; gap:8px; align-items:center; animation:fadeup .45s ease both;}
  .mslide p{font-family:var(--serif); font-style:italic; font-size:13.5px; line-height:1.5; color:#cdd9e5; text-align:center;}
  .mslide p b{color:var(--ink);}
  .mico{display:flex; gap:9px; align-items:center; justify-content:center; height:26px;}
  .mico .mi, .mico svg{width:23px; height:23px;}
  .mico.gold{color:var(--gold2);}
  .mico.wind{color:#74d4bc;}
  .mico.fog{color:#b3c2d3;}
  .mico .crown{width:34px; height:24px; margin:0;}
  .mdots{display:flex; gap:7px; justify-content:center; padding-top:10px;}
  .mdots i{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.22); cursor:pointer; transition:all .3s;}
  .mdots i.on{background:var(--gold2); box-shadow:0 0 7px rgba(216,181,74,.8); transform:scale(1.25);}
  .menugrid{display:grid; grid-template-columns:1fr 1fr; gap:9px; width:min(340px,100%); margin:15px auto 0; flex:0 0 auto;}
  .mtile{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    font-family:var(--disp); font-weight:800; text-transform:uppercase; letter-spacing:.06em; font-size:11px;
    color:#e9f0f7; padding:12px 8px 11px; border-radius:13px; cursor:pointer;
    background:linear-gradient(180deg,#2a3b55,#1b2940); border:1.5px solid #51678a;
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.14), 0 0 0 2px rgba(8,16,28,.5);
    transition:transform .1s, filter .15s;}
  .mtile:active{transform:scale(.96);}
  .mtile .mi{width:21px; height:21px; opacity:.95;}
  .mtile.wide{grid-column:1/-1; flex-direction:row; gap:10px; font-size:13.5px; letter-spacing:.1em; padding:14px 10px;}
  .mtile.wide .mi{width:19px; height:19px;}
  .mtile.gold{background:linear-gradient(180deg,#b08c28,#73561a); border-color:#ecd07a; color:#fff7da;
    text-shadow:0 1px 2px rgba(60,40,0,.5); position:relative; overflow:hidden;}
  .mtile.gold::after{content:""; position:absolute; top:0; bottom:0; width:46%; left:-60%;
    background:linear-gradient(100deg, transparent, rgba(255,255,255,.28), transparent);
    animation:shine 3.2s ease-in-out infinite;}
  .mtile.green{background:linear-gradient(180deg,#1b7c4d,#0f5634); border-color:#9fcdb0;}
  .mtile.blue{background:linear-gradient(180deg,#1c5286,#143c64); border-color:#9fc0e0;}

  /* rules open as their own scrollable sheet */
  .ruleswrap{position:fixed; inset:0; z-index:52; background:rgba(3,8,15,.6); display:flex;
    align-items:flex-end; justify-content:center;}
  .rulesheet{width:min(560px,100vw); max-height:82dvh; overflow-y:auto; background:rgba(10,18,30,.97);
    border:1px solid var(--glassbrd); border-bottom:0; border-radius:18px 18px 0 0;
    padding:16px 18px calc(18px + env(safe-area-inset-bottom));
    box-shadow:0 -10px 50px rgba(0,0,0,.6);}
  .rules{font-size:13px; color:#c6d2e2; line-height:1.6; text-align:left;}
  .rules b{color:var(--gold2); font-family:var(--disp); font-weight:700; letter-spacing:.04em; text-transform:uppercase; font-size:12px;}
  .rules .mi{color:var(--gold2);}
  .rules .rkey{display:flex; gap:9px; align-items:baseline; margin:7px 0;}
  .rules .rkey .rk{flex:0 0 auto; min-width:64px; font-family:var(--disp); font-weight:700; font-size:11.5px;
    text-transform:uppercase; letter-spacing:.04em; color:var(--ink);}

  /* stretch-cleared stamp */
  .clearwrap{position:fixed; inset:0; z-index:51; display:flex; flex-direction:column; gap:18px;
    align-items:center; justify-content:center; background:rgba(3,9,16,.55); cursor:pointer;
    backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); animation:fadein .3s ease;}
  @keyframes fadein{from{opacity:0;} to{opacity:1;}}
  .clearstamp{text-align:center; animation:stamp .55s cubic-bezier(.2,1.45,.4,1) both; transform-origin:center;}
  @keyframes stamp{from{opacity:0; transform:rotate(7deg) scale(2.2);} to{opacity:1; transform:rotate(-4deg) scale(1);}}
  .clearstamp .cs1{display:inline-block; font-family:var(--disp); font-weight:800; text-transform:uppercase;
    letter-spacing:.12em; text-indent:.12em; font-size:clamp(19px,6vw,26px); color:#fff;
    background:linear-gradient(180deg,#177347,#0f5634); border:2.5px solid #e8f2ea; outline:2.5px solid #0c3a23;
    border-radius:10px; padding:13px 22px; box-shadow:0 14px 44px rgba(0,0,0,.6);}
  .clearstamp .cs2{margin-top:13px; font-family:var(--mono); font-size:14.5px; color:var(--gold2);
    text-shadow:0 0 16px rgba(216,181,74,.55), 0 1px 3px #000;}
  .clearstamp .cs3{margin-top:5px; font-family:var(--serif); font-style:italic; font-size:13px; color:#c8d4e1;
    text-shadow:0 1px 3px #000;}
  .clearnext{animation:fadeup .4s ease .7s both;}

  /* ================= ART ================= */
  .cgart{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:50%;}
  .ibart{float:left; width:62px; height:62px; border-radius:50%; object-fit:cover; margin:0 11px 4px 0;
    border:1px solid rgba(216,181,74,.4); box-shadow:0 3px 10px rgba(0,0,0,.4);}
  .infobar.omen .ibart{border-color:#4f8a62;}
  .sart{flex:0 0 auto; width:56px; height:56px; border-radius:50%; object-fit:cover;
    border:1px solid #3d5176; box-shadow:0 3px 9px rgba(0,0,0,.4);}
  .pcard .face .fart{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:4.5px;}
  .pcard .face{overflow:hidden;}
  .pcard .face .fart ~ span{position:absolute; bottom:1px; right:2.5px; font-size:12px; line-height:1;
    color:var(--sc); background:rgba(246,240,224,.85); border-radius:4px; padding:1.5px 3px; z-index:2;}
  .pcard .face .fart ~ .ftick{z-index:2;}
  .bart{flex:0 0 auto; width:64px; height:64px; border-radius:50%; object-fit:cover; align-self:center;
    border:1.5px solid #b8473c; box-shadow:0 4px 12px rgba(0,0,0,.5);}
  .endmed{position:relative; flex:0 0 auto; width:94px; height:94px; margin:0 auto 6px; border-radius:50%;
    border:2px solid rgba(216,181,74,.5); box-shadow:0 0 30px rgba(216,181,74,.25); overflow:hidden;
    background:#0c1322;}
  .endmed .endart{width:100%; height:100%; object-fit:cover;}
  .endmed .crown{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); display:none;}
  .endmed:has(.crown:only-child) .crown{display:block;}
  .fogmed{border-color:rgba(147,166,186,.4); box-shadow:0 0 30px rgba(147,166,186,.15);}

  /* ================= INTRO ================= */
  .intro{flex:1; display:flex; flex-direction:column; min-height:0; cursor:pointer;}
  .ithead{display:flex; justify-content:space-between; align-items:center; padding:4px 2px; flex:0 0 auto;}
  .ittitle{font-family:var(--disp); font-weight:800; text-transform:uppercase; letter-spacing:.16em;
    color:var(--gold2); font-size:16.5px; text-shadow:0 0 16px rgba(216,181,74,.45);
    animation:fadeup .5s ease both;}
  .itbody{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:15px; padding:8px 4px; min-height:0;}
  .itstage{display:flex; flex-direction:column; align-items:center; gap:13px; min-height:158px; justify-content:center;}
  .itrow{display:flex; align-items:center; justify-content:center; gap:7px;}
  /* the caption, broken into short segments that land one after another */
  .itcaps{display:flex; flex-direction:column; gap:8px; align-items:center; width:100%;}
  .itcap{font-family:var(--serif); color:#dde6f0; font-size:16px; line-height:1.55;
    text-align:center; max-width:410px; width:min(410px,96%); text-shadow:0 1px 3px rgba(2,6,12,.9);
    animation:fadeup .55s ease both; background:rgba(7,14,23,.7); border:1px solid rgba(160,190,215,.14);
    border-radius:13px; padding:10px 16px; backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px);}
  .itcap .mi{color:var(--gold2); font-style:normal;}
  .itkiosk{display:inline-flex; flex-direction:column; align-items:center; gap:8px;}
  .itlbl{font-family:var(--disp); font-weight:600; font-size:11.5px; text-transform:uppercase;
    letter-spacing:.05em; color:var(--dim); text-align:center; line-height:1.4;}
  .itcap b{color:var(--ink); font-style:normal;}
  @media (max-height:760px){
    .itcap{font-size:14.5px; padding:8px 13px;}
    .itcaps{gap:6px;} .itbody{gap:10px;}
  }
  /* drives / discards tokens */
  .ittokgrp{display:flex; flex-direction:column; gap:8px; align-items:center;}
  .ittokrow{display:flex; gap:8px; align-items:center;}
  .ittok{width:40px; height:40px; border-radius:11px; display:inline-flex; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#a07f24,#6e5414); border:1.5px solid #e2c25e; color:#fff7da;
    box-shadow:0 4px 10px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18);}
  .ittok .mi{width:21px; height:21px;}
  .ittok.disc{background:linear-gradient(180deg,#27486e,#1a3354); border-color:#9fc0e0; color:#dce9f6;}
  /* the scoring equation */
  .iteq{display:flex; align-items:baseline; gap:11px; font-family:var(--mono); font-variant-numeric:tabular-nums;}
  .iteq>span{animation:slam .4s cubic-bezier(.2,1.5,.4,1) both;}
  .iteq .ekm{font-size:27px; color:#7fc3e8;}
  .iteq .etm{font-size:27px; color:#f49a82;}
  .iteq .eop{font-size:20px; color:var(--dim); font-family:var(--disp); font-weight:700;}
  .iteq .etot{font-size:36px; color:var(--gold2); text-shadow:0 0 20px rgba(216,181,74,.55);}
  .iteq i{font-style:normal; font-size:11px; font-family:var(--disp); font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:var(--faint); margin-left:3px;}
  .pcard.it{margin:0; cursor:default; transform:none;}
  .pcard.it.sm{width:52px; height:74px;}
  .pcard.it.sm .idx b{font-size:14px;} .pcard.it.sm .bigpip svg{width:25px;height:25px;}
  .pcard.it.sm .bigpip .ring{width:38px; height:38px;}
  .pcard.it.sm .bigpip .gbg{font-size:38px;}
  .pcard.it.sm .face{font-size:21px; inset:12px 8px 12px;}
  .pcard.it.sm .idx.flip{display:none;}
  .itd{display:inline-flex; flex-direction:column; align-items:center; gap:6px;
    animation:itdeal .55s cubic-bezier(.2,1.25,.35,1) both;}
  @keyframes itdeal{from{opacity:0; transform:translateY(34px) rotate(7deg) scale(.7);}
    to{opacity:1; transform:translateY(0) rotate(0) scale(1);}}
  .itkm{font-family:var(--mono); font-size:13.5px; color:#9fd9ef; animation:itfloat .5s ease both;
    text-shadow:0 1px 4px #000;}
  @keyframes itfloat{from{opacity:0; transform:translateY(7px);} to{opacity:1; transform:translateY(0);}}
  .con.icon{font-size:13px; min-width:16px;}
  .con.icon i{font-size:12px;}
  .itcd{animation:conpop .4s cubic-bezier(.2,1.5,.4,1) 1.2s both;}
  .itcd.d1{animation-delay:.55s;} .itcd.d2{animation-delay:.95s;}
  .itcd.d3{animation-delay:1.35s;} .itcd.d4{animation-delay:1.75s;}
  @keyframes conpop{from{opacity:0; transform:scale(.2);} to{opacity:1; transform:scale(1);}}
  .ittempo{font-family:var(--disp); font-weight:800; letter-spacing:.1em; font-size:22px;
    text-transform:uppercase;}
  .ittempo.gold{color:var(--gold2); text-shadow:0 0 18px rgba(216,181,74,.75);}
  .itslam{animation:slam .4s cubic-bezier(.2,1.5,.4,1) both;}
  /* scene 0: a proper road, dashes streaming under a cruising car */
  .itroadscene{position:relative; width:min(330px,86vw); height:92px; align-self:center;}
  .itroadband{position:absolute; left:-16px; right:-16px; bottom:4px; height:46px; border-radius:11px;
    background:linear-gradient(180deg,#3a434e,#262d36 55%,#1d232b); border:1px solid #4a545f; overflow:hidden;
    box-shadow:0 8px 22px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);}
  .itroadband::before,.itroadband::after{content:""; position:absolute; left:0; right:0; height:3px;
    background:#d9d3be; opacity:.6; border-radius:2px;}
  .itroadband::before{top:5px;} .itroadband::after{bottom:5px;}
  .itlane{position:absolute; left:-46px; right:-46px; top:50%; height:4px; margin-top:-2px;
    background:repeating-linear-gradient(90deg,#ecd98e 0 26px, transparent 26px 46px);
    animation:lanemove .5s linear infinite;}
  @keyframes lanemove{from{transform:translateX(0)} to{transform:translateX(-46px)}}
  .itcar2{position:absolute; bottom:26px; left:50%; width:82px;
    animation:itdrivein 1.5s cubic-bezier(.25,.9,.35,1) .2s both;
    filter:drop-shadow(0 7px 7px rgba(0,0,0,.5));}
  @keyframes itdrivein{from{transform:translateX(-50%) translateX(-180px); opacity:0;}
    20%{opacity:1;} to{transform:translateX(-50%) translateX(0); opacity:1;}}
  .itcarbob{display:block; animation:carbob .85s ease-in-out infinite alternate;}
  @keyframes carbob{from{transform:translateY(0)} to{transform:translateY(-2.5px)}}
  .itcarart{display:block; width:100%; height:auto;}
  .itcarart .wh{animation:wheelspin .6s linear infinite; transform-box:fill-box; transform-origin:center;}
  @keyframes wheelspin{to{transform:rotate(360deg)}}
  .itcar2 .puff{position:absolute; left:-7px; bottom:6px; width:9px; height:9px; border-radius:50%;
    background:rgba(205,215,225,.45); animation:puff 1.7s ease-out .9s infinite;}
  .itcar2 .p2{animation-delay:1.75s;}
  @keyframes puff{0%{opacity:0; transform:translate(0,0) scale(.4);} 15%{opacity:.7;}
    100%{opacity:0; transform:translate(-24px,-11px) scale(1.6);}}
  .itpop{animation:itdeal .5s cubic-bezier(.2,1.25,.35,1) both;}
  /* scene 5: the swap */
  .itswapwrap{position:relative; display:flex; gap:7px; align-items:center;}
  .itswapwrap .itsw{display:inline-block; animation:itdeal .5s cubic-bezier(.2,1.25,.35,1) both;}
  .itswapwrap .itsw.b{animation-name:itdeal,itswapB; animation-duration:.5s,.9s;
    animation-delay:.2s,3.1s; animation-fill-mode:both,forwards;
    animation-timing-function:cubic-bezier(.2,1.25,.35,1),cubic-bezier(.5,1.4,.4,1);}
  .itswapwrap .itsw.c{animation-name:itdeal,itswapC; animation-duration:.5s,.9s;
    animation-delay:.4s,3.1s; animation-fill-mode:both,forwards;
    animation-timing-function:cubic-bezier(.2,1.25,.35,1),cubic-bezier(.5,1.4,.4,1);}
  @keyframes itswapB{from{transform:translate(0,0);} 50%{transform:translate(35px,-46px);} to{transform:translate(69px,0);}}
  @keyframes itswapC{from{transform:translate(0,0);} 50%{transform:translate(-35px,46px);} to{transform:translate(-69px,0);}}
  .itx1{animation:itx1 .4s cubic-bezier(.2,1.5,.4,1) 1.4s both; color:var(--dim);}
  @keyframes itx1{0%{opacity:0; transform:scale(1.6);} 100%{opacity:1; transform:scale(1);}}
  .itx2{animation:itx2 .5s cubic-bezier(.2,1.5,.4,1) 4.2s both; position:relative; margin-top:-29px;}
  @keyframes itx2{from{opacity:0; transform:scale(1.8);} to{opacity:1; transform:scale(1);}}
  .intro .itx1{animation-name:itx1,itxout; animation-duration:.4s,.3s; animation-delay:1.4s,4.1s;
    animation-fill-mode:both,forwards;}
  @keyframes itxout{from{opacity:1;} to{opacity:0;}}
  /* scene 7: the kill */
  .itkill{animation:itdeal .55s cubic-bezier(.2,1.25,.35,1) both, itkill .6s ease 1.6s forwards;}
  @keyframes itkill{from{filter:none;} to{filter:grayscale(1) brightness(.45);}}
  .itdie{animation:itdiecon .4s ease both; color:var(--bad) !important; font-size:15px;}
  @keyframes itdiecon{from{opacity:0;} to{opacity:1;}}
  .itnav{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:8px 2px 2px;}
  .itnav .bx{min-width:74px;}
  .itdots{display:flex; gap:7px; justify-content:center; padding:8px 0 2px; flex-wrap:wrap;}
  .itdots i{width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.16); transition:all .3s;}
  .itdots i.on{background:var(--gold2); box-shadow:0 0 8px rgba(216,181,74,.7); transform:scale(1.25);}
  .itdots i.done{background:rgba(216,181,74,.45);}

  /* ================= MISC ================= */
  .spread{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .hudtop{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; padding:2px 0;}
  #toast{position:fixed; left:50%; bottom:108px; transform:translateX(-50%) translateY(8px); z-index:60;
    background:linear-gradient(180deg,#1b4a7e,#143a64); border:1.5px solid #cfe0f0; color:#eef4fa;
    border-radius:10px; padding:11px 17px; font-family:var(--disp); font-size:13px; letter-spacing:.05em;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; max-width:88vw; text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,.5);}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  hr{border:0; border-top:1px solid rgba(255,255,255,.1); margin:12px 0;}
  .kn{color:var(--gold2); font-family:var(--mono); font-variant-numeric:tabular-nums;}
  @media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.001s !important; transition-duration:.001s !important;} }
</style>
</head>
<body>
<div id="scene" aria-hidden="true">
  <div class="sky"></div>
  <div class="plx" style="--pd:-5px">
    <div class="stars"></div>
    <div class="shoot"></div>
    <div class="rays"></div>
    <div class="sun"></div>
    <div class="cloud c1"></div><div class="cloud c2"></div>
    <div class="birds b1"><svg viewBox="0 0 30 14"><path class="wu" d="M2 9 Q8 3 15 8 Q22 3 28 9"/><path class="wd" d="M2 6 Q8 11 15 7 Q22 11 28 6"/></svg></div>
    <div class="birds b2"><svg viewBox="0 0 30 14"><path class="wu" d="M2 9 Q8 3 15 8 Q22 3 28 9"/><path class="wd" d="M2 6 Q8 11 15 7 Q22 11 28 6"/></svg></div>
  </div>

    <svg class="mtn m2" viewBox="0 0 1000 260" preserveAspectRatio="none"><path d="M0 260 L0 175 L48 146 L85 116 L128 138 L175 160 L218 126 L255 86 L298 120 L365 146 L412 122 L455 106 L508 138 L555 166 L602 128 L645 90 L702 124 L755 156 L803 134 L845 116 L894 138 L935 156 L972 142 L1000 130 L1000 260 Z"/></svg>
    <svg class="isle" viewBox="0 0 220 30" preserveAspectRatio="none"><path d="M0 30 Q28 16 64 13 Q92 4 122 10 Q170 13 220 30 Z"/></svg>
  </div>
  <div class="plx" style="--pd:-14px">
    <svg class="mtn m1" viewBox="0 0 1000 220" preserveAspectRatio="none"><path d="M0 220 L0 148 L58 114 L115 76 L168 106 L225 136 L276 98 L325 56 L382 94 L445 126 L508 96 L575 66 L628 100 L695 136 L756 110 L815 86 L868 116 L915 140 L958 122 L1000 106 L1000 220 Z"/></svg>
  </div>
  <div class="sea"></div>

  <div class="fogband f2"></div>
  <div class="plx" style="--pd:-22px">
    <svg class="trees" viewBox="0 0 200 150" aria-hidden="true">
      <path d="M0 150 L0 145 Q44 128 92 132 Q150 126 200 137 L200 150 Z"/>
      <path class="sway s2" d="M37 134 C26 112 25 84 33 56 C35 47 39 41 41 41 C43 41 47 47 49 56 C57 84 56 112 45 134 Z"/>
      <path class="sway s3" d="M66 136 C59 120 58 100 64 81 C65.5 75 68 71 69.5 71 C71 71 73.5 75 75 81 C81 100 80 120 73 136 Z"/>
      <g class="sway"><path d="M141 138 L146 100 L151 138 Z"/>
        <path d="M104 106 C112 76 130 62 147 62 C166 62 184 79 191 104 C177 95 162 93 148 96 C132 93 116 98 104 106 Z"/></g>
